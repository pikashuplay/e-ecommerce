@for (item of produtos(); track item){
    <app-produto
    [nome] = "item.nome"
    [preco] = "item.preco"
    (produtoSelecionado)="exibirProduto($event)"
    ></app-produto>
}
<p><button (click)="adicionarProduto()">adiciona Produto</button></p>
