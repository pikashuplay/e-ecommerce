@for (item of produtos(); track item){
    <app-produto
    [nome] = "item.nome"
    [preco] = "item.preco"
    (produtoSelecionado)="exibirProduto($event)"
    ></app-produto>
}
<p><button (click)="adicionarProduto()">adiciona Produto
</button></p>
<h2>Total de produtos: {{totalProdutos()}}</h2>
<h3>Valor total:{{valorTotal() | precoFormatado}}</h3>
<p><button (click)="substituirprodutos()">Substituir Produtos
</button></p>
